<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>お問い合わせ | Theater TEN Company</title>
<meta name="description" content="Theater TEN Companyへのお問い合わせフォーム。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <a href="index.html" class="logo">Theater TEN Company</a>
  <button class="nav-toggle" aria-label="メニュー" aria-expanded="false"><span></span></button>
  <nav class="site-nav">
    <a class="nav-link" href="performances.html">公演情報</a>
    <a class="nav-link" href="about.html">劇団紹介</a>
    <a class="nav-link" href="members.html">メンバー紹介</a>
    <a class="nav-link" href="access.html">アクセス</a>
    <a class="nav-link is-active" href="contact.html" style="color:var(--accent-red)">お問い合わせ</a>
  </nav>
</header>

<div class="page-title">
  <div class="eyebrow" style="color:var(--accent-red)">Contact</div>
  <h1>お問い合わせ</h1>
</div>

<div class="contact-form">
  <!--
    このフォームは Formspree (https://formspree.io) を利用しています。
    無料アカウントを作成し、発行された Form ID を下の
    "YOUR_FORM_ID" の部分に置き換えてください。
    手順は同フォルダの README.md を参照。
  -->
  <form class="form-stack" action="https://formspree.io/f/YOUR_FORM_ID" method="POST" id="contact-form">
    <div class="field">
      <label for="name">お名前</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div class="field">
      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="field">
      <label for="category">お問い合わせ種別</label>
      <select id="category" name="category">
        <option>公演について</option>
        <option>取材・メディア</option>
        <option>ワークショップについて</option>
        <option>その他</option>
      </select>
    </div>
    <div class="field">
      <label for="message">お問い合わせ内容</label>
      <textarea id="message" name="message" rows="6" required></textarea>
    </div>
    <button type="submit" class="submit-btn">送信する</button>
    <div class="form-note">送信フォームは Formspree(外部サービス)を利用しています。設定が完了するまでは送信できません。</div>
  </form>
</div>

<footer class="site-footer">
  <div>
    <div class="brand">Theater TEN Company</div>
    <div class="addr">沖縄県那覇市 · アトリエTheater TEN</div>
  </div>
  <div class="copyright">© 2026 Theater TEN Company</div>
</footer>

<script src="js/nav.js"></script>
</body>
</html>
