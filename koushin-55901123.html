<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>投稿窓口 | Theater TEN Company</title>
<meta name="description" content="劇団員専用の投稿窓口です。">
<script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
<script defer src="/_vercel/insights/script.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="masthead" style="border-bottom:3px solid var(--ink)">
  <span class="logo">Theater TEN Company</span>
  <div class="since">劇団員専用<br>投稿窓口</div>
</header>

<div class="page-head-v2">
  <div class="kicker" style="color:var(--accent-red-bright)">Members Only</div>
  <h1>投稿窓口</h1>
  <div class="note-text">このページは劇団員専用です。URLを外部の方と共有しないでください。送信内容は代表・制作担当が確認したうえでサイトに反映されます。</div>
</div>

<div class="contact-v2" style="grid-template-columns:1fr">
  <div class="form-side" style="max-width:560px">
    <!-- 投稿窓口フォーム(Googleフォーム)の回答受付URLに直接送信しています。 -->
    <form class="form-stack" action="https://docs.google.com/forms/d/e/1FAIpQLSc81T0wM91qnmgqYJulaUoqWA-IxqnB5lGDpDatl3BU1NKPjg/formResponse" method="POST" target="hidden-iframe" id="post-form">
      <div class="field">
        <label for="name">名前</label>
        <input type="text" id="name" name="entry.328992978" required>
      </div>
      <div class="field">
        <label for="category">種別</label>
        <select id="category" name="entry.1448683413">
          <option>ニュース</option>
          <option>公演情報の追加・修正依頼</option>
          <option>プロフィール変更依頼</option>
          <option>その他・要望</option>
        </select>
      </div>
      <div class="field">
        <label for="title">タイトル</label>
        <input type="text" id="title" name="entry.756854158" required>
      </div>
      <div class="field">
        <label for="date">日付</label>
        <input type="date" id="date">
        <input type="hidden" id="date-year" name="entry.336099288_year">
        <input type="hidden" id="date-month" name="entry.336099288_month">
        <input type="hidden" id="date-day" name="entry.336099288_day">
      </div>
      <div class="field">
        <label for="body">本文</label>
        <textarea id="body" name="entry.1105532969" rows="6" required></textarea>
      </div>
      <div class="field">
        <label for="image-file">チラシ画像やプロフ画像など(任意)</label>
        <input type="file" id="image-file" accept="image/*">
        <div class="form-note" id="upload-status"></div>
      </div>
      <button type="submit" class="submit-btn">送信する →</button>
      <div class="form-note" id="post-status"></div>
    </form>
    <iframe name="hidden-iframe" style="display:none"></iframe>
  </div>
</div>

<footer class="site-footer">
  <div>
    <div class="brand">Theater TEN Company</div>
    <div class="addr">沖縄県那覇市 · アトリエTheater TEN</div>
  </div>
  <div class="copyright">© 2026 Theater TEN Company</div>
</footer>

<script>
  // Cloudinary(画像アップロード先)の設定。ログイン不要のUnsignedプリセットを使用。
  var CLOUD_NAME = "b0da7npk";
  var UPLOAD_PRESET = "ttc-uploads";

  document.addEventListener("DOMContentLoaded", function () {
    var fileInput = document.getElementById("image-file");
    var bodyField = document.getElementById("body");
    var uploadStatus = document.getElementById("upload-status");
    var submitBtn = document.querySelector('#post-form button[type="submit"]');
    var dateInput = document.getElementById("date");

    fileInput.addEventListener("change", function () {
      var file = fileInput.files[0];
      if (!file) return;

      uploadStatus.textContent = "アップロード中...";
      uploadStatus.style.color = "var(--sub-warm-light)";
      submitBtn.disabled = true;

      var formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", UPLOAD_PRESET);

      fetch("https://api.cloudinary.com/v1_1/" + CLOUD_NAME + "/image/upload", {
        method: "POST",
        body: formData
      })
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (!data.secure_url) throw new Error("upload failed");
          // Googleフォーム側に画像専用の項目がないため、本文の末尾にURLを追記する
          var sep = bodyField.value.trim() ? "\n\n" : "";
          bodyField.value += sep + "[添付画像] " + data.secure_url;
          uploadStatus.textContent = "画像をアップロードしました(本文末尾に追記されました)。";
          uploadStatus.style.color = "var(--accent-blue)";
        })
        .catch(function () {
          uploadStatus.textContent = "画像のアップロードに失敗しました。もう一度お試しください。";
          uploadStatus.style.color = "var(--accent-red)";
        })
        .finally(function () {
          submitBtn.disabled = false;
        });
    });
  });

  document.getElementById("post-form").addEventListener("submit", function () {
    // 日付(YYYY-MM-DD)を、Googleフォームの日付項目が求める年/月/日に分割する
    var dateInput = document.getElementById("date");
    if (dateInput.value) {
      var parts = dateInput.value.split("-");
      document.getElementById("date-year").value = parts[0];
      document.getElementById("date-month").value = parts[1];
      document.getElementById("date-day").value = parts[2];
    }

    var status = document.getElementById("post-status");
    status.textContent = "送信しました。確認後、サイトに反映されます。";
    status.style.color = "var(--accent-blue)";
  });
</script>
</body>
</html>
