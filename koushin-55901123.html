<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>投稿窓口 | Theater TEN Company</title>
<meta name="description" content="劇団員専用の投稿窓口です。">
<link rel="icon" type="image/svg+xml" href="images/favicon.svg">
<script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
<script defer src="/_vercel/insights/script.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="masthead" style="border-bottom:3px solid var(--ink)">
  <span class="logo">Theater TEN Company</span>
  <div class="since">劇団員専用<br>投稿窓口</div>
</header>

<div class="page-head-v2">
  <div class="kicker" style="color:var(--accent-red-bright)">Members Only</div>
  <h1>投稿窓口</h1>
  <div class="note-text">このページは劇団員専用です。URLを外部の方と共有しないでください。送信内容は代表・制作担当が確認したうえでサイトに反映されます。</div>
</div>

<div class="contact-v2" style="grid-template-columns:1fr">
  <div class="form-side" style="max-width:560px">
    <!-- 送信は自サイトの /api/submit を経由してGoogleフォームへ転送される(送信先URLをクライアントに露出させないため)。 -->
    <form class="form-stack" id="post-form">
      <div class="field">
        <label for="name">名前</label>
        <input type="text" id="name" required>
      </div>
      <div class="field">
        <label for="category">種別</label>
        <select id="category">
          <option>ニュース</option>
          <option>公演情報</option>
          <option>チケットURL更新</option>
          <option>プロフィール変更依頼</option>
          <option>その他・要望</option>
        </select>
      </div>
      <div class="field">
        <label for="title">タイトル</label>
        <input type="text" id="title" required>
      </div>
      <div class="field">
        <label for="date">初日・代表日(一覧表示・並び替え用)</label>
        <input type="date" id="date">
      </div>
      <div class="field">
        <label for="body">本文</label>
        <textarea id="body" rows="6" required placeholder="複数日程がある場合は、こちらに全て書いてください(例: 8月8日(土) 13:00/18:00 など)"></textarea>
      </div>
      <div class="field">
        <label for="image-file">チラシ画像やプロフ画像など(任意・複数選択可)</label>
        <input type="file" id="image-file" accept="image/*" multiple>
        <div class="form-note" id="upload-status"></div>
      </div>
      <!-- ハニーポット: 人間には見えない項目。自動送信ボットはよく埋めてしまうため検出に使う -->
      <input type="text" id="hp-field" name="hp" autocomplete="off" tabindex="-1" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0">
      <button type="submit" class="submit-btn">送信する →</button>
      <div class="form-note" id="post-status"></div>
    </form>
  </div>
</div>

<footer class="site-footer">
  <div>
    <div class="brand">Theater TEN Company</div>
    <div class="addr">沖縄県那覇市 · アトリエTheater TEN</div>
  </div>
  <div class="copyright">© 2026 Theater TEN Company</div>
</footer>

<script>
  // Cloudinary(画像アップロード先)の設定。ログイン不要のUnsignedプリセットを使用。
  var CLOUD_NAME = "b0da7npk";
  var UPLOAD_PRESET = "ttc-uploads";

  document.addEventListener("DOMContentLoaded", function () {
    var fileInput = document.getElementById("image-file");
    var bodyField = document.getElementById("body");
    var uploadStatus = document.getElementById("upload-status");
    var submitBtn = document.querySelector('#post-form button[type="submit"]');
    var dateInput = document.getElementById("date");
    var categoryField = document.getElementById("category");

    var defaultPlaceholder = bodyField.getAttribute("placeholder");
    categoryField.addEventListener("change", function () {
      if (categoryField.value === "チケットURL更新") {
        bodyField.setAttribute("placeholder", "新しいチケット予約フォームのURLを貼ってください(カルテットオンラインなど)。確認後、チケットページに反映します。");
      } else {
        bodyField.setAttribute("placeholder", defaultPlaceholder);
      }
    });

    function uploadOne(file) {
      var formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", UPLOAD_PRESET);

      return fetch("https://api.cloudinary.com/v1_1/" + CLOUD_NAME + "/image/upload", {
        method: "POST",
        body: formData
      })
        .then(function (res) { return res.json(); })
        .then(function (data) {
          if (!data.secure_url) throw new Error("upload failed");
          return data.secure_url;
        });
    }

    fileInput.addEventListener("change", function () {
      var files = Array.prototype.slice.call(fileInput.files);
      if (files.length === 0) return;

      uploadStatus.textContent = "アップロード中(0/" + files.length + ")...";
      uploadStatus.style.color = "var(--sub-warm-light)";
      submitBtn.disabled = true;

      var done = 0;
      var chain = Promise.resolve();

      files.forEach(function (file) {
        chain = chain
          .then(function () { return uploadOne(file); })
          .then(function (url) {
            done++;
            // Googleフォーム側には画像専用の項目がないため、本文の末尾に1行ずつ追記する。
            // サイト表示側(news-feed.js)がこの行を検出して、実際の画像として表示する。
            var sep = bodyField.value.trim() ? "\n\n" : "";
            bodyField.value += sep + "[添付画像] " + url;
            uploadStatus.textContent = "アップロード中(" + done + "/" + files.length + ")...";
          });
      });

      chain
        .then(function () {
          uploadStatus.textContent = files.length + "枚の画像をアップロードしました。";
          uploadStatus.style.color = "var(--accent-blue)";
        })
        .catch(function () {
          uploadStatus.textContent = "画像のアップロードに失敗しました。もう一度お試しください。";
          uploadStatus.style.color = "var(--accent-red)";
        })
        .finally(function () {
          submitBtn.disabled = false;
        });
    });
  });

  document.getElementById("post-form").addEventListener("submit", function (e) {
    e.preventDefault();

    var status = document.getElementById("post-status");
    var submitBtn = document.querySelector('#post-form button[type="submit"]');
    submitBtn.disabled = true;
    status.textContent = "送信中...";
    status.style.color = "var(--sub-warm-light)";

    var payload = {
      name: document.getElementById("name").value,
      category: document.getElementById("category").value,
      title: document.getElementById("title").value,
      date: document.getElementById("date").value,
      body: document.getElementById("body").value,
      hp: document.getElementById("hp-field").value
    };

    fetch("/api/submit", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
      .then(function (res) {
        if (!res.ok) throw new Error("submit failed");
        return res.json();
      })
      .then(function () {
        status.textContent = "送信しました。確認後、サイトに反映されます。";
        status.style.color = "var(--accent-blue)";
        document.getElementById("post-form").reset();
      })
      .catch(function () {
        status.textContent = "送信に失敗しました。もう一度お試しください。";
        status.style.color = "var(--accent-red)";
      })
      .finally(function () {
        submitBtn.disabled = false;
      });
  });
</script>
</body>
</html>
