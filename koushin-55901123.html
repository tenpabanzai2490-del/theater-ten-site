<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>投稿窓口 | Theater TEN Company</title>
<meta name="description" content="劇団員専用の投稿窓口です。">
<script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
<script defer src="/_vercel/insights/script.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="masthead" style="border-bottom:3px solid var(--ink)">
  <span class="logo">Theater TEN Company</span>
  <div class="since">劇団員専用<br>投稿窓口</div>
</header>

<div class="page-head-v2">
  <div class="kicker" style="color:var(--accent-red-bright)">Members Only</div>
  <h1>投稿窓口</h1>
  <div class="note-text">このページは劇団員専用です。URLを外部の方と共有しないでください。送信内容は代表・制作担当が確認したうえでサイトに反映されます。</div>
</div>

<div class="contact-v2" style="grid-template-columns:1fr">
  <div class="form-side" style="max-width:560px">
    <!--
      このフォームはGoogleフォームの回答受付URLに直接送信する仕組みです。
      SUBMIT_URL と各 entry.xxxxx の項目IDは、実際のGoogleフォーム作成後に
      Claude Codeが設定します(現時点ではプレースホルダーです)。
    -->
    <form class="form-stack" action="SUBMIT_URL" method="POST" target="hidden-iframe" id="post-form">
      <div class="field">
        <label for="name">お名前</label>
        <input type="text" id="name" name="entry.000000001" required>
      </div>
      <div class="field">
        <label for="category">種別</label>
        <select id="category" name="entry.000000002">
          <option>ニュース</option>
          <option>公演情報の追加・修正依頼</option>
          <option>プロフィール変更依頼</option>
          <option>その他・要望</option>
        </select>
      </div>
      <div class="field">
        <label for="title">タイトル</label>
        <input type="text" id="title" name="entry.000000003" required>
      </div>
      <div class="field">
        <label for="date">日付(例: 2026.08.01)</label>
        <input type="text" id="date" name="entry.000000004">
      </div>
      <div class="field">
        <label for="body">本文</label>
        <textarea id="body" name="entry.000000005" rows="6" required></textarea>
      </div>
      <button type="submit" class="submit-btn">送信する →</button>
      <div class="form-note" id="post-status"></div>
    </form>
    <iframe name="hidden-iframe" style="display:none"></iframe>
  </div>
</div>

<footer class="site-footer">
  <div>
    <div class="brand">Theater TEN Company</div>
    <div class="addr">沖縄県那覇市 · アトリエTheater TEN</div>
  </div>
  <div class="copyright">© 2026 Theater TEN Company</div>
</footer>

<script>
  document.getElementById("post-form").addEventListener("submit", function () {
    var status = document.getElementById("post-status");
    status.textContent = "送信しました。確認後、サイトに反映されます。";
    status.style.color = "var(--accent-blue)";
  });
</script>
</body>
</html>
